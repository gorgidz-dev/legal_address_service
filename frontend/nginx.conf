# Nginx-конфиг внутри фронт-контейнера: отдаёт SPA + проксирует API/WebSocket
# на backend. TLS терминирует внешний прокси (Caddy/Cloudflare/хостовый nginx).

upstream backend_api {
    server backend:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;
    server_name _;

    # Security headers (минимум). CSP под фронт + Yandex Maps + WS.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    # CSP: разрешает фронт (Vite + inline), Yandex Maps JS API и WebSocket-чат.
    # ⚠ Проверить на проде, что карта грузится; при новых внешних доменах — дополнить.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api-maps.yandex.ru https://*.maps.yandex.net https://yastatic.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # Не отдавать никаких служебных файлов.
    location ~ /\.(env|git|ht) { deny all; return 404; }

    # API → бэкенд. Префикс /api/v1 совпадает с FastAPI.
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 25m;
    }

    # WebSocket для чата.
    location /ws/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Health-эндпоинт бэка для внешних чекеров.
    location = /health {
        proxy_pass http://backend_api/health;
    }

    # Статика Vite — иммутабельная, можно кешировать.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Service Worker без кеша.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA-фолбэк: всё неизвестное → index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        # nginx НЕ наследует server-level add_header в location, где есть свой
        # add_header — поэтому security-заголовки (в т.ч. CSP) повторяем ЗДЕСЬ,
        # иначе сам HTML-документ уходит без них. (В прод-топологии их дублирует
        # Caddy на кромке, но nginx-слой обязан работать и без него.)
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api-maps.yandex.ru https://*.maps.yandex.net https://yastatic.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    }

    # Размер компрессии.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
