<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Иллюстрация: здания и локация">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2F1FD"/>
      <stop offset="1" stop-color="#E5E2F8"/>
    </linearGradient>
    <linearGradient id="g-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B86F4"/>
      <stop offset="1" stop-color="#6B66ED"/>
    </linearGradient>
    <linearGradient id="g-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="g-pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C7AF0"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>

  <!-- soft cloud background blobs -->
  <ellipse cx="320" cy="280" rx="280" ry="180" fill="url(#bg)"/>
  <ellipse cx="160" cy="200" rx="90" ry="60" fill="#EAE7FA" opacity="0.7"/>
  <ellipse cx="480" cy="180" rx="70" ry="46" fill="#EAE7FA" opacity="0.7"/>

  <!-- ground soft shadow -->
  <ellipse cx="300" cy="430" rx="220" ry="14" fill="#312E81" opacity="0.08"/>

  <!-- LEFT building -->
  <g transform="translate(78 226)">
    <rect x="0" y="0" width="130" height="210" rx="14" fill="url(#g-left)"/>
    <!-- windows -->
    <g fill="#ffffff">
      <rect x="18" y="22" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="52" y="22" width="22" height="22" rx="5" opacity="0.75"/>
      <rect x="86" y="22" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="18" y="58" width="22" height="22" rx="5" opacity="0.75"/>
      <rect x="52" y="58" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="86" y="58" width="22" height="22" rx="5" opacity="0.75"/>
      <rect x="18" y="94" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="52" y="94" width="22" height="22" rx="5" opacity="0.75"/>
      <rect x="86" y="94" width="22" height="22" rx="5" opacity="0.95"/>
    </g>
    <!-- door -->
    <rect x="40" y="140" width="50" height="70" rx="8" fill="#312E81" opacity="0.55"/>
    <circle cx="78" cy="176" r="2.4" fill="#FBBF24"/>
  </g>

  <!-- MIDDLE tall building -->
  <g transform="translate(230 110)">
    <rect x="0" y="0" width="170" height="326" rx="16" fill="url(#g-mid)"/>
    <!-- crown -->
    <rect x="55" y="-24" width="60" height="24" rx="6" fill="#4338CA"/>
    <rect x="82" y="-46" width="6" height="22" rx="2" fill="#4338CA"/>
    <circle cx="85" cy="-50" r="6" fill="#A5B4FC"/>
    <!-- windows: 4 cols × 7 rows -->
    <g fill="#ffffff">
      <!-- row 1 -->
      <rect x="20" y="30" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="56" y="30" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="92" y="30" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="128" y="30" width="26" height="26" rx="5" opacity="0.78"/>
      <!-- row 2 -->
      <rect x="20" y="68" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="56" y="68" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="92" y="68" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="128" y="68" width="26" height="26" rx="5" opacity="0.95"/>
      <!-- row 3 -->
      <rect x="20" y="106" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="56" y="106" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="92" y="106" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="128" y="106" width="26" height="26" rx="5" opacity="0.78"/>
      <!-- row 4 -->
      <rect x="20" y="144" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="56" y="144" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="92" y="144" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="128" y="144" width="26" height="26" rx="5" opacity="0.95"/>
      <!-- row 5 -->
      <rect x="20" y="182" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="56" y="182" width="26" height="26" rx="5" opacity="0.78"/>
      <rect x="92" y="182" width="26" height="26" rx="5" opacity="0.95"/>
      <rect x="128" y="182" width="26" height="26" rx="5" opacity="0.78"/>
    </g>
    <!-- entrance arch -->
    <rect x="58" y="240" width="54" height="86" rx="27" fill="#312E81" opacity="0.55"/>
    <circle cx="98" cy="284" r="3" fill="#FBBF24"/>
  </g>

  <!-- RIGHT building -->
  <g transform="translate(420 270)">
    <rect x="0" y="0" width="110" height="166" rx="12" fill="url(#g-right)"/>
    <g fill="#ffffff">
      <rect x="14" y="20" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="46" y="20" width="22" height="22" rx="5" opacity="0.78"/>
      <rect x="78" y="20" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="14" y="56" width="22" height="22" rx="5" opacity="0.78"/>
      <rect x="46" y="56" width="22" height="22" rx="5" opacity="0.95"/>
      <rect x="78" y="56" width="22" height="22" rx="5" opacity="0.78"/>
    </g>
    <rect x="34" y="104" width="42" height="62" rx="8" fill="#0F0F4A" opacity="0.55"/>
  </g>

  <!-- floating map pin above the central building -->
  <g transform="translate(312 36)">
    <ellipse cx="0" cy="98" rx="20" ry="5" fill="#312E81" opacity="0.18"/>
    <path d="M0 0 c-20 0 -34 16 -34 36 c0 26 34 64 34 64 s34 -38 34 -64 c0 -20 -14 -36 -34 -36z" fill="url(#g-pin)"/>
    <circle cx="0" cy="36" r="12" fill="#ffffff"/>
    <circle cx="0" cy="36" r="6" fill="#4F46E5"/>
  </g>

  <!-- tiny decoration: floating dots/sparkles -->
  <g fill="#4F46E5" opacity="0.55">
    <circle cx="78" cy="120" r="4"/>
    <circle cx="540" cy="120" r="3.5"/>
    <circle cx="560" cy="220" r="3"/>
    <circle cx="58" cy="320" r="3"/>
  </g>
  <g stroke="#4F46E5" stroke-width="2" fill="none" opacity="0.45">
    <path d="M104 80 l10 0 M109 75 l0 10"/>
    <path d="M520 80 l10 0 M525 75 l0 10"/>
  </g>
</svg>
